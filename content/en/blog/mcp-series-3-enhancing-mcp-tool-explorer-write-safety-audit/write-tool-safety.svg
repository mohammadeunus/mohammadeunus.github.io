<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Two-Step Write Tool Confirmation</text>

  <!-- Vertical divider -->
  <line x1="450" y1="44" x2="450" y2="420" stroke="#cccccc" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ═══ LEFT: First Call ═══ -->
  <text x="225" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">First Call — No Confirm Token</text>

  <!-- Step 1: Claude sends request -->
  <rect x="30" y="70" width="390" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="225" y="92" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">Claude</text>
  <text x="225" y="110" text-anchor="middle" font-size="12" fill="#555">POST /mcp  tools/call  create_quote</text>
  <text x="225" y="124" text-anchor="middle" font-size="11" fill="#777">{ customer: "Acme Corp", amount: 5000 }</text>

  <!-- Arrow down -->
  <line x1="225" y1="130" x2="225" y2="162" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="233" y="151" font-size="11" fill="#555" font-style="italic">no confirmToken</text>

  <!-- Step 2: Server returns pending -->
  <rect x="30" y="164" width="390" height="80" rx="8" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5"/>
  <text x="225" y="184" text-anchor="middle" font-weight="bold" font-size="13" fill="#e65100">Server</text>
  <text x="225" y="202" text-anchor="middle" font-size="12" fill="#555">Returns confirmToken — nothing executed</text>
  <text x="46" y="220" font-size="11" fill="#777">{ confirmToken: "abc123",</text>
  <text x="46" y="234" font-size="11" fill="#777">  message: "Call again with token to confirm." }</text>

  <!-- Arrow down -->
  <line x1="225" y1="244" x2="225" y2="274" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Pending state -->
  <rect x="30" y="276" width="390" height="52" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="225" y="298" text-anchor="middle" font-weight="bold" font-size="12" fill="#e65100">&#9208; Awaiting Human Confirmation</text>
  <text x="225" y="316" text-anchor="middle" font-size="11" fill="#777">Claude presents intent to user — no side-effects yet</text>

  <!-- ═══ RIGHT: Second Call ═══ -->
  <text x="675" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Second Call — With Confirm Token</text>

  <!-- Step 1: Claude sends with token -->
  <rect x="480" y="70" width="390" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="92" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">Claude</text>
  <text x="675" y="110" text-anchor="middle" font-size="12" fill="#555">POST /mcp  tools/call  create_quote</text>
  <text x="675" y="124" text-anchor="middle" font-size="11" fill="#777">{ customer: "Acme Corp", amount: 5000, confirmToken: "abc123" }</text>

  <!-- Arrow down -->
  <line x1="675" y1="130" x2="675" y2="162" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="683" y="151" font-size="11" fill="#555" font-style="italic">includes confirmToken</text>

  <!-- Step 2: Server validates -->
  <rect x="480" y="164" width="390" height="60" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="675" y="184" text-anchor="middle" font-weight="bold" font-size="13" fill="#333">Server — Validates Token</text>
  <text x="496" y="204" font-size="12" fill="#555">· Single-use  · 5-min TTL  · scoped to tool + payload</text>
  <text x="496" y="218" font-size="11" fill="#777">Token consumed immediately on validation</text>

  <!-- Arrow down -->
  <line x1="675" y1="224" x2="675" y2="254" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="683" y="244" font-size="11" fill="#555" font-style="italic">executes operation</text>

  <!-- Step 3: Server executes -->
  <rect x="480" y="256" width="390" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="278" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">Backend API — Operation Executed</text>

  <!-- Arrow down -->
  <line x1="675" y1="300" x2="675" y2="328" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Success response -->
  <rect x="480" y="330" width="390" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="350" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">{ success: true, quoteId: 1042 }</text>
  <text x="675" y="366" text-anchor="middle" font-size="11" fill="#555">Returned to Claude &#10003;</text>

  <!-- ═══ Bottom note ═══ -->
  <rect x="30" y="430" width="840" height="36" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="450" y="450" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">Token is single-use, expires in 5 minutes, scoped to the specific tool —</text>
  <text x="450" y="463" text-anchor="middle" font-size="11" fill="#c62828" font-style="italic">cannot be replayed against a different tool or different payload</text>
</svg>
