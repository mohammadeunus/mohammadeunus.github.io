<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388e3c"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">MCP Protocol Handshake</text>

  <!-- Participant: Claude -->
  <rect x="60" y="44" width="140" height="36" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="67" text-anchor="middle" font-weight="bold" font-size="13" fill="#0d47a1">Claude</text>

  <!-- Participant: MCP Server -->
  <rect x="700" y="44" width="160" height="36" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="780" y="67" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">MCP Server</text>

  <!-- Lifelines -->
  <line x1="130" y1="80" x2="130" y2="400" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="780" y1="80" x2="780" y2="400" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ── Row 0: GET /mcp discovery (dashed) ── -->
  <line x1="130" y1="110" x2="776" y2="110" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="455" y="105" text-anchor="middle" font-size="11" fill="#757575" font-style="italic">GET /mcp  — discovery hint (optional probe)</text>
  <!-- return -->
  <line x1="780" y1="128" x2="134" y2="128" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="455" y="143" text-anchor="middle" font-size="11" fill="#757575" font-style="italic">200 OK  · protocol info JSON</text>

  <!-- ── Row 1: initialize ── -->
  <!-- label block -->
  <rect x="200" y="160" width="460" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="430" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">POST /mcp  →  initialize  (clientInfo + protocol version)</text>
  <line x1="130" y1="172" x2="198" y2="172" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="172" x2="778" y2="172" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- return -->
  <line x1="780" y1="200" x2="134" y2="200" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="455" y="215" text-anchor="middle" font-size="11" fill="#388e3c" font-style="italic">200 OK  · serverInfo + capabilities</text>

  <!-- ── Row 2: tools/list ── -->
  <rect x="200" y="232" width="460" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="430" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">POST /mcp  →  tools/list  (get available tools)</text>
  <line x1="130" y1="244" x2="198" y2="244" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="244" x2="778" y2="244" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- return -->
  <line x1="780" y1="272" x2="134" y2="272" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="455" y="287" text-anchor="middle" font-size="11" fill="#388e3c" font-style="italic">200 OK  · array of tool definitions (name, description, parameters)</text>

  <!-- ── Row 3: tools/call ── -->
  <rect x="200" y="304" width="460" height="28" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="430" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">POST /mcp  →  tools/call  (toolName + arguments)</text>
  <line x1="130" y1="316" x2="198" y2="316" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="316" x2="778" y2="316" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- return -->
  <line x1="780" y1="344" x2="134" y2="344" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="455" y="359" text-anchor="middle" font-size="11" fill="#388e3c" font-style="italic">200 OK  · tool result  (content array)</text>

  <!-- Footer note -->
  <text x="450" y="395" text-anchor="middle" font-size="11" fill="#9e9e9e" font-style="italic">All requests use the same POST /mcp endpoint · JSON-RPC 2.0 protocol</text>

</svg>
