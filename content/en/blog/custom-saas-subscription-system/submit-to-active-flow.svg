<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="960" height="300" fill="#ffffff"/>

  <!-- ── HAPPY PATH ── -->

  <!-- Step 1: Submit -->
  <rect x="20" y="40" width="150" height="90" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="95" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">1. Submit</text>
  <text x="95" y="89" text-anchor="middle" font-size="11" fill="#333">Customer confirms</text>
  <text x="95" y="105" text-anchor="middle" font-size="11" fill="#333">plan and details</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="85" x2="208" y2="85" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Account — no features yet -->
  <rect x="210" y="40" width="150" height="90" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="285" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">2. Account</text>
  <text x="285" y="89" text-anchor="middle" font-size="11" fill="#333">Created — no features</text>
  <text x="285" y="105" text-anchor="middle" font-size="11" fill="#777" font-style="italic">active yet</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="85" x2="398" y2="85" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Payment -->
  <rect x="400" y="40" width="150" height="90" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="475" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">3. Payment</text>
  <text x="475" y="89" text-anchor="middle" font-size="11" fill="#333">Secure Tap</text>
  <text x="475" y="105" text-anchor="middle" font-size="11" fill="#333">payment page</text>

  <!-- Arrow 3→4 -->
  <line x1="550" y1="85" x2="588" y2="85" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Activated -->
  <rect x="590" y="40" width="150" height="90" rx="10" fill="#ede7f6" stroke="#512da8" stroke-width="1.5"/>
  <text x="665" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#311b92">4. Activated</text>
  <text x="665" y="89" text-anchor="middle" font-size="11" fill="#333">All selected features</text>
  <text x="665" y="105" text-anchor="middle" font-size="11" fill="#333">switched on</text>

  <!-- Arrow 4→5 -->
  <line x1="740" y1="85" x2="778" y2="85" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Ready -->
  <rect x="780" y="40" width="160" height="90" rx="10" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
  <text x="860" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#004d40">5. Ready</text>
  <text x="860" y="89" text-anchor="middle" font-size="11" fill="#333">Confirmation email sent</text>
  <text x="860" y="105" text-anchor="middle" font-size="11" fill="#333">Log in — system ready</text>

  <!-- ── ACTIVATION NOTE (below steps 3–4) ── -->
  <rect x="390" y="138" width="360" height="36" rx="7" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="570" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Note:</text>
  <text x="570" y="167" text-anchor="middle" font-size="11" fill="#555">Features activate only when the payment gateway confirms</text>

  <!-- ── INCOMPLETE PATH (no payment) ── -->

  <!-- Dashed arrow down from Step 3 -->
  <line x1="475" y1="178" x2="475" y2="210" stroke="#e65100" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr-orange)"/>

  <!-- Incomplete path box -->
  <rect x="270" y="212" width="410" height="72" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.3"/>
  <text x="475" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">If no payment after 24–48 hours</text>
  <text x="475" y="252" text-anchor="middle" font-size="11" fill="#333">· Automated reminder sent by email and WhatsApp</text>
  <text x="475" y="269" text-anchor="middle" font-size="11" fill="#333">· Team notified to follow up and help onboard manually</text>

</svg>
