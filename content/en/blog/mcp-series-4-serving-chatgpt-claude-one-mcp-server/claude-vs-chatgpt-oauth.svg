<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388e3c"/>
    </marker>
  </defs>

  <rect width="1000" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Same MCP Server, Two AI Clients</text>

  <!-- Column headings -->
  <text x="250" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">Claude — runs on your laptop</text>
  <text x="750" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">ChatGPT — runs in the cloud</text>
  <line x1="500" y1="72" x2="500" y2="378" stroke="#cccccc" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ═══════════ LEFT: CLAUDE ═══════════ -->

  <!-- L Box 1 -->
  <rect x="110" y="80" width="280" height="58" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="250" y="104" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">Claude Code / Desktop</text>
  <text x="250" y="124" text-anchor="middle" font-size="12" fill="#333">Runs locally on your machine</text>

  <!-- L Arrow 1 -->
  <line x1="250" y1="138" x2="250" y2="183" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="258" y="166" font-size="11" fill="#555" font-style="italic">opens a random localhost callback</text>

  <!-- L Box 2 -->
  <rect x="110" y="185" width="280" height="58" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="250" y="209" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">http://localhost:39616/callback</text>
  <text x="250" y="229" text-anchor="middle" font-size="12" fill="#777" font-style="italic">port changes on every run</text>

  <!-- L Arrow 2 -->
  <line x1="250" y1="243" x2="250" y2="288" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="258" y="271" font-size="11" fill="#555" font-style="italic">can't pre-register the URI</text>

  <!-- L Box 3 -->
  <rect x="110" y="290" width="280" height="64" rx="8" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <text x="250" y="314" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">Bridge Middleware REQUIRED</text>
  <text x="250" y="333" text-anchor="middle" font-size="11.5" fill="#333">saves port in a cookie, rewrites the</text>
  <text x="250" y="348" text-anchor="middle" font-size="11.5" fill="#333">redirect_uri to a registered endpoint</text>

  <!-- ═══════════ RIGHT: CHATGPT ═══════════ -->

  <!-- R Box 1 -->
  <rect x="610" y="80" width="280" height="58" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="750" y="104" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">ChatGPT Connector</text>
  <text x="750" y="124" text-anchor="middle" font-size="12" fill="#333">Runs in OpenAI's cloud</text>

  <!-- R Arrow 1 -->
  <line x1="750" y1="138" x2="750" y2="183" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="758" y="166" font-size="11" fill="#555" font-style="italic">uses one fixed cloud callback</text>

  <!-- R Box 2 -->
  <rect x="610" y="185" width="280" height="58" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="750" y="209" text-anchor="middle" font-weight="bold" font-size="11" fill="#1b5e20">chatgpt.com/connector_platform_oauth_redirect</text>
  <text x="750" y="229" text-anchor="middle" font-size="12" fill="#777" font-style="italic">same URL every time</text>

  <!-- R Arrow 2 -->
  <line x1="750" y1="243" x2="750" y2="288" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="758" y="271" font-size="11" fill="#555" font-style="italic">register the URI once</text>

  <!-- R Box 3 -->
  <rect x="610" y="290" width="280" height="64" rx="8" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
  <text x="750" y="314" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">No Bridge Needed</text>
  <text x="750" y="333" text-anchor="middle" font-size="11.5" fill="#333">client-ID gate means the request</text>
  <text x="750" y="348" text-anchor="middle" font-size="11.5" fill="#333">passes straight through, untouched</text>

  <!-- ═══════════ CONVERGE ═══════════ -->
  <line x1="250" y1="354" x2="440" y2="406" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="750" y1="354" x2="560" y2="406" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="500" y="392" text-anchor="middle" font-size="11" fill="#555" font-style="italic">same endpoint for both</text>

  <!-- Shared MCP Server -->
  <rect x="300" y="408" width="400" height="56" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="500" y="431" text-anchor="middle" font-weight="bold" font-size="13" fill="#0d47a1">MCP Server  ·  POST /mcp</text>
  <text x="500" y="451" text-anchor="middle" font-size="11.5" fill="#333">one tool layer · one JWT validator · one token-forwarding handler</text>

  <!-- Arrow to identity server -->
  <line x1="500" y1="464" x2="500" y2="491" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Identity Server -->
  <rect x="300" y="494" width="400" height="46" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="500" y="522" text-anchor="middle" font-weight="bold" font-size="13" fill="#4a148c">OpenIddict Identity Server  ·  validates tokens from both</text>
</svg>
