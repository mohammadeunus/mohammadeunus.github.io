{{ define "main" }}
<div class="row justify-content-center">
  <div class="col-md-10 col-lg-8">
    <article>
      <h1>{{ .Title }}</h1>
      {{ if .Content }}<div class="mb-4">{{ .Content }}</div>{{ end }}
      {{ $section := . }}
      <ul>
        {{ range (where .Site.Sections "Section" "in" .Section) }}
          {{ range .Sections }}
            {{ range .RegularPages }}
              <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
            {{ end }}
          {{ end }}
        {{ end }}
      </ul>
    </article>
  </div>
</div>
{{ end }}
